<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div{
            width:200px;
            height:200px;
            border:3px solid red;
            background-color: aqua;                             
        }
        #yourdiv{
            text-align:center;
            transform:rotatey(180deg)
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>Styling the div tag is easy</div>
    <div id="yourdiv">Transform</div>
    <div>But be careful</div>
</body>
</html>
